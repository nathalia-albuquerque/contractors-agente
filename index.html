<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0d2040 0%, #1a3a6e 100%);
    padding: 28px 24px 22px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .logo { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
  .logo span { color: #f5a800; font-weight: 700; }
  header h1 { font-size: 22px; color: #fff; font-weight: 700; margin-bottom: 16px; }

  .search-wrap { max-width: 560px; margin: 0 auto; position: relative; }
  .search-wrap input {
    width: 100%; padding: 13px 48px 13px 18px;
    border-radius: 30px; border: none;
    font-size: 15px; outline: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    color: #1a2a3a;
  }
  .search-wrap input::placeholder { color: #8a9ab0; }
  .search-icon {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    color: #f5a800; font-size: 18px; pointer-events: none;
  }

  .stats { display: flex; justify-content: center; gap: 24px; margin-top: 14px; }
  .stat { font-size: 12px; color: rgba(255,255,255,0.55); }
  .stat strong { color: #f5a800; }

  main { max-width: 820px; margin: 28px auto; padding: 0 16px 40px; }

  #resultado-count {
    font-size: 13px; color: #5a7090; margin-bottom: 14px;
    min-height: 20px;
  }

  .card {
    background: #fff; border-radius: 12px; padding: 20px 22px;
    margin-bottom: 14px; border-left: 4px solid #f5a800;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    transition: box-shadow 0.2s, transform 0.2s;
    cursor: pointer;
  }
  .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.12); transform: translateY(-1px); }
  .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .card-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: #fff8e6; display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; margin-top: 1px;
  }
  .card-title { font-size: 15px; font-weight: 700; color: #0d2040; line-height: 1.3; }
  .card-sintoma { font-size: 13px; color: #5a7090; margin-bottom: 10px; line-height: 1.5; }

  .card-body { display: none; border-top: 1px solid #f0f4f8; padding-top: 12px; margin-top: 4px; }
  .card.aberto .card-body { display: block; }
  .card-section-label {
    font-size: 10px; font-weight: 700; color: #f5a800;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; margin-top: 10px;
  }
  .card-section-label:first-child { margin-top: 0; }
  .card-text { font-size: 13px; color: #2a3a4a; line-height: 1.6; }
  .card-text ol, .card-text ul { padding-left: 18px; margin-top: 4px; }
  .card-text li { margin-bottom: 3px; }
  .card-text code {
    background: #f0f4f8; border-radius: 4px; padding: 1px 6px;
    font-family: 'Consolas', monospace; font-size: 12px; color: #c0392b;
  }

  .tag {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 20px; margin-right: 5px; margin-top: 8px; font-weight: 600;
  }
  .tag-erro { background: #fdecea; color: #c0392b; }
  .tag-config { background: #e8f4fd; color: #1a6fa0; }
  .tag-precadastro { background: #e8f8f0; color: #1a8a50; }
  .tag-atividade { background: #f3e8fd; color: #7a2fb0; }
  .tag-integracao { background: #fff3e0; color: #e07b00; }
  .tag-basis { background: #fde8e8; color: #a02020; }

  .toggle-btn {
    font-size: 11px; color: #f5a800; font-weight: 700;
    margin-top: 8px; display: inline-block; cursor: pointer;
    user-select: none;
  }

  .empty { text-align: center; padding: 48px 0; color: #8a9ab0; font-size: 15px; }
  .empty strong { display: block; font-size: 32px; margin-bottom: 8px; }

  footer { text-align: center; font-size: 11px; color: #8a9ab0; padding-bottom: 20px; }

</head>

function filtrar() {
  const termo = document.getElementById('busca').value.toLowerCase().trim();
  const lista = document.getElementById('lista');
  const count = document.getElementById('resultado-count');
  lista.innerHTML = '';

  const resultados = termo === '' ? BASE : BASE.filter(item => {
    const texto = (item.titulo + ' ' + item.sintoma + ' ' + item.causa + ' ' + item.palavras.join(' ')).toLowerCase();
    return termo.split(' ').every(t => texto.includes(t));
  });

  if (resultados.length === 0) {
    lista.innerHTML = `<div class="empty"><strong>🔍</strong>Nenhum resultado para "<strong>${termo}</strong>".<br>Tente outras palavras-chave.</div>`;
    count.textContent = '';
    return;
  }

  if (termo !== '') {
    count.textContent = `${resultados.length} resultado${resultados.length > 1 ? 's' : ''} encontrado${resultados.length > 1 ? 's' : ''} para "${termo}"`;
  } else {
    count.textContent = `${BASE.length} artigos disponíveis`;
  }

  resultados.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const tagsHTML = item.tags.map((t, j) => `<span class="tag ${t}">${item.tagLabels[j]}</span>`).join('');
    card.innerHTML = `
      <div class="card-header">
        <div class="card-icon">${item.icon}</div>
        <div>
          <div class="card-title">${item.titulo}</div>
          ${tagsHTML}
        </div>
      </div>
      <div class="card-sintoma">${item.sintoma}</div>
      <span class="toggle-btn">▶ Ver solução</span>
      <div class="card-body">
        <div class="card-section-label">Causa</div>
        <div class="card-text">${item.causa}</div>
        <div class="card-section-label">Solução</div>
        <div class="card-text">${item.solucao}</div>
        ${item.obs ? `<div class="card-section-label">Observação</div><div class="card-text">${item.obs}</div>` : ''}
      </div>
    `;
    card.querySelector('.toggle-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const aberto = card.classList.toggle('aberto');
      card.querySelector('.toggle-btn').textContent = aberto ? '▼ Fechar' : '▶ Ver solução';
    });
    lista.appendChild(card);
  });
}

filtrar();
</script>
</body>
</html>
